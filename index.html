<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النورس CRM - نظام إدارة المتاجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .dark { background-color: #111827; }
        .dark body { background-color: #111827; color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script type="module">
        import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';

        // USER ROLES & PERMISSIONS
        const ROLES = {
            NEW_MERCHANTS: 'new_merchants',      // مسؤول المتاجر الجديدة
            ACTIVE_MERCHANTS: 'active_merchants', // مسؤول المتاجر النشطة
            RETENTION: 'retention',               // مسؤول الاستعادة
            SALES_MANAGER: 'sales_manager',       // مدير المبيعات
            GENERAL_MANAGER: 'general_manager'    // المدير العام
        };

        const ROLE_LABELS = {
            [ROLES.NEW_MERCHANTS]: 'مسؤول المتاجر الجديدة',
            [ROLES.ACTIVE_MERCHANTS]: 'مسؤول المتاجر النشطة',
            [ROLES.RETENTION]: 'مسؤول الاستعادة',
            [ROLES.SALES_MANAGER]: 'مدير المبيعات',
            [ROLES.GENERAL_MANAGER]: 'المدير العام'
        };

        // MOCK USERS DATABASE (replace with real backend)
        const USERS = [
            { id: 1, username: 'new_officer', password: '123', name: 'أحمد المسؤول', role: ROLES.NEW_MERCHANTS },
            { id: 2, username: 'active_officer', password: '123', name: 'سارة النشطة', role: ROLES.ACTIVE_MERCHANTS },
            { id: 3, username: 'retention_officer', password: '123', name: 'محمد الاستعادة', role: ROLES.RETENTION },
            { id: 4, username: 'manager', password: '123', name: 'فاطمة المديرة', role: ROLES.SALES_MANAGER },
            { id: 5, username: 'admin', password: 'admin123', name: 'عبدالله المدير العام', role: ROLES.GENERAL_MANAGER }
        ];

        // MOCK DATA
        const generateNewMerchants = (count) => {
            const names = ['متجر الأمل', 'بيت الأزياء', 'عالم الإلكترونيات', 'ركن الهدايا', 'سوق الجملة'];
            const result = [];
            const now = Date.now();
            
            for (let i = 0; i < count; i++) {
                const registeredMinutesAgo = i < 3 ? Math.floor(Math.random() * 25) : Math.floor(Math.random() * 1440); // First 3 are golden
                result.push({
                    id: i + 2000,
                    customer_id: i + 2000,
                    name: names[i % names.length] + ' ' + (i + 1),
                    phone: '0' + (920000000 + Math.floor(Math.random() * 9999999)),
                    registration_date: new Date(now - registeredMinutesAgo * 60000).toISOString(),
                    minutes_since_registration: registeredMinutesAgo,
                    is_golden: registeredMinutesAgo < 60,
                    contacted: false,
                    assigned_to: null,
                    contact_notes: []
                });
            }
            return result.sort((a, b) => a.minutes_since_registration - b.minutes_since_registration);
        };

        const generateActiveMerchants = (count) => {
            const names = ['متجر النجاح', 'دار الفخامة', 'بيت الجودة'];
            return Array.from({ length: count }, (_, i) => ({
                id: i + 3000,
                customer_id: i + 3000,
                name: names[i % names.length] + ' ' + (i + 1),
                phone: '0' + (930000000 + Math.floor(Math.random() * 9999999)),
                registration_date: new Date(Date.now() - Math.random() * 90 * 86400000).toISOString(),
                last_shipment_date: new Date(Date.now() - Math.random() * 7 * 86400000).toISOString(),
                total_shipments: Math.floor(Math.random() * 500) + 50,
                needs_survey: Math.random() > 0.7,
                assigned_to: null,
                survey_responses: []
            }));
        };

        const generateInactiveMerchants = (count) => {
            const names = ['متجر التوقف', 'بيت الراحة', 'سوق الهدوء'];
            return Array.from({ length: count }, (_, i) => ({
                id: i + 4000,
                customer_id: i + 4000,
                name: names[i % names.length] + ' ' + (i + 1),
                phone: '0' + (940000000 + Math.floor(Math.random() * 9999999)),
                registration_date: new Date(Date.now() - Math.random() * 90 * 86400000).toISOString(),
                last_shipment_date: new Date(Date.now() - (15 + Math.random() * 30) * 86400000).toISOString(),
                retention_attempts: 0,
                assigned_to: null,
                retention_notes: []
            }));
        };

        // Main App Component
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [isDark, setIsDark] = useState(false);
            const [newMerchants, setNewMerchants] = useState(generateNewMerchants(20));
            const [activeMerchants, setActiveMerchants] = useState(generateActiveMerchants(15));
            const [inactiveMerchants, setInactiveMerchants] = useState(generateInactiveMerchants(10));
            const [allUsers, setAllUsers] = useState(USERS);

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
            };

            const handleLogin = (user) => {
                setCurrentUser(user);
                localStorage.setItem('currentUser', JSON.stringify(user));
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('currentUser');
            };

            useEffect(() => {
                const savedUser = localStorage.getItem('currentUser');
                if (savedUser) setCurrentUser(JSON.parse(savedUser));
            }, []);

            if (!currentUser) {
                return h(LoginPage, { onLogin: handleLogin });
            }

            return h('div', { className: 'flex min-h-screen' },
                h(Sidebar, { 
                    currentUser, 
                    isDark, 
                    toggleTheme, 
                    onLogout: handleLogout 
                }),
                h(MainContent, {
                    currentUser,
                    newMerchants,
                    setNewMerchants,
                    activeMerchants,
                    setActiveMerchants,
                    inactiveMerchants,
                    setInactiveMerchants,
                    allUsers,
                    setAllUsers
                })
            );
        }

        // Login Page
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const user = USERS.find(u => u.username === username && u.password === password);
                if (user) {
                    onLogin(user);
                } else {
                    setError('اسم المستخدم أو كلمة المرور غير صحيحة');
                }
            };

            return h('div', { className: 'min-h-screen bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center p-4' },
                h('div', { className: 'bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md' },
                    h('div', { className: 'text-center mb-8' },
                        h('div', { className: 'w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 text-4xl' }, '🦅'),
                        h('h1', { className: 'text-3xl font-bold text-gray-900 mb-2' }, 'النورس CRM'),
                        h('p', { className: 'text-gray-600' }, 'نظام إدارة المتاجر')
                    ),
                    error && h('div', { className: 'mb-4 p-3 bg-red-100 text-red-800 rounded-xl text-sm font-semibold' }, error),
                    h('form', { onSubmit: handleSubmit, className: 'space-y-4' },
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, 'اسم المستخدم'),
                            h('input', {
                                type: 'text',
                                value: username,
                                onChange: (e) => setUsername(e.target.value),
                                required: true,
                                className: 'w-full px-4 py-3 border-2 rounded-xl focus:border-blue-500 outline-none'
                            })
                        ),
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, 'كلمة المرور'),
                            h('input', {
                                type: 'password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                required: true,
                                className: 'w-full px-4 py-3 border-2 rounded-xl focus:border-blue-500 outline-none'
                            })
                        ),
                        h('button', {
                            type: 'submit',
                            className: 'w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:from-blue-600 hover:to-blue-700 transition-all shadow-lg'
                        }, 'تسجيل الدخول')
                    ),
                    h('div', { className: 'mt-6 pt-6 border-t' },
                        h('p', { className: 'text-xs text-gray-500 text-center mb-3' }, 'حسابات تجريبية:'),
                        h('div', { className: 'grid grid-cols-2 gap-2 text-xs' },
                            h('div', { className: 'bg-gray-50 p-2 rounded' }, 
                                h('strong', null, 'جديد: '), 'new_officer / 123'
                            ),
                            h('div', { className: 'bg-gray-50 p-2 rounded' }, 
                                h('strong', null, 'نشط: '), 'active_officer / 123'
                            ),
                            h('div', { className: 'bg-gray-50 p-2 rounded' }, 
                                h('strong', null, 'استعادة: '), 'retention_officer / 123'
                            ),
                            h('div', { className: 'bg-gray-50 p-2 rounded' }, 
                                h('strong', null, 'مدير: '), 'manager / 123'
                            ),
                            h('div', { className: 'bg-gradient-to-r from-purple-500 to-purple-600 text-white p-2 rounded col-span-2 text-center font-bold' }, 
                                '👑 مدير عام: admin / admin123'
                            )
                        )
                    )
                )
            );
        }

        // Sidebar
        function Sidebar({ currentUser, isDark, toggleTheme, onLogout }) {
            return h('aside', { className: 'w-72 bg-white dark:bg-gray-800 border-l border-gray-200 dark:border-gray-700 flex flex-col shadow-lg' },
                h('div', { className: 'p-6 border-b border-gray-200 dark:border-gray-700' },
                    h('div', { className: 'flex items-center gap-3 mb-4' },
                        h('div', { className: 'w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center text-2xl' }, '🦅'),
                        h('div', null,
                            h('h1', { className: 'text-xl font-bold text-gray-900 dark:text-white' }, 'النورس CRM'),
                            h('p', { className: 'text-xs text-gray-500 dark:text-gray-400' }, 'نظام إدارة المتاجر')
                        )
                    ),
                    h('div', { 
                        className: currentUser.role === ROLES.GENERAL_MANAGER 
                            ? 'bg-gradient-to-r from-purple-500 to-purple-600 p-3 rounded-xl text-white'
                            : 'bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl'
                    },
                        currentUser.role === ROLES.GENERAL_MANAGER && h('div', { className: 'flex items-center gap-2 mb-1' },
                            h('span', { className: 'text-xl' }, '👑'),
                            h('span', { className: 'text-xs font-bold' }, 'صلاحيات كاملة')
                        ),
                        h('p', { className: 'text-sm font-bold ' + (currentUser.role === ROLES.GENERAL_MANAGER ? 'text-white' : 'text-blue-900 dark:text-blue-300') }, currentUser.name),
                        h('p', { className: 'text-xs ' + (currentUser.role === ROLES.GENERAL_MANAGER ? 'text-purple-100' : 'text-blue-700 dark:text-blue-400') }, ROLE_LABELS[currentUser.role])
                    )
                ),
                h('div', { className: 'flex-1' }),
                h('div', { className: 'p-4 border-t border-gray-200 dark:border-gray-700 space-y-3' },
                    h('button', {
                        onClick: toggleTheme,
                        className: 'w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all'
                    },
                        h('span', { className: 'text-2xl' }, isDark ? '☀️' : '🌙'),
                        h('span', { className: 'font-semibold text-gray-700 dark:text-gray-300' }, 
                            isDark ? 'الوضع النهاري' : 'الوضع الليلي'
                        )
                    ),
                    h('button', {
                        onClick: onLogout,
                        className: 'w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 transition-all font-semibold'
                    },
                        h('span', { className: 'text-2xl' }, '🚪'),
                        h('span', null, 'تسجيل الخروج')
                    )
                )
            );
        }

        // Main Content Router
        function MainContent({ currentUser, newMerchants, setNewMerchants, activeMerchants, setActiveMerchants, inactiveMerchants, setInactiveMerchants, allUsers, setAllUsers }) {
            switch(currentUser.role) {
                case ROLES.NEW_MERCHANTS:
                    return h(NewMerchantsOfficerView, { 
                        merchants: newMerchants, 
                        setMerchants: setNewMerchants,
                        currentUser 
                    });
                case ROLES.ACTIVE_MERCHANTS:
                    return h(ActiveMerchantsOfficerView, { 
                        merchants: activeMerchants, 
                        setMerchants: setActiveMerchants,
                        currentUser 
                    });
                case ROLES.RETENTION:
                    return h(RetentionOfficerView, { 
                        merchants: inactiveMerchants, 
                        setMerchants: setInactiveMerchants,
                        currentUser 
                    });
                case ROLES.SALES_MANAGER:
                    return h(ManagerView, { 
                        newMerchants, 
                        setNewMerchants,
                        activeMerchants,
                        setActiveMerchants,
                        inactiveMerchants,
                        setInactiveMerchants,
                        allUsers,
                        setAllUsers
                    });
                case ROLES.GENERAL_MANAGER:
                    return h(GeneralManagerView, { 
                        newMerchants, 
                        setNewMerchants,
                        activeMerchants,
                        setActiveMerchants,
                        inactiveMerchants,
                        setInactiveMerchants,
                        allUsers,
                        setAllUsers,
                        currentUser
                    });
                default:
                    return h('div', { className: 'p-8' }, 'صلاحية غير معروفة');
            }
        }

        // GENERAL MANAGER VIEW (Full Access)
        function GeneralManagerView({ newMerchants, setNewMerchants, activeMerchants, setActiveMerchants, inactiveMerchants, setInactiveMerchants, allUsers, setAllUsers, currentUser }) {
            const [currentTab, setCurrentTab] = useState('overview'); // overview, new, active, retention, distribution, users

            return h('div', { className: 'flex-1 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    // Header
                    h('div', { className: 'mb-8 bg-gradient-to-r from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-xl' },
                        h('div', { className: 'flex items-center gap-4' },
                            h('div', { className: 'text-6xl' }, '👑'),
                            h('div', null,
                                h('h1', { className: 'text-3xl font-bold mb-1' }, 'لوحة المدير العام'),
                                h('p', { className: 'text-purple-100' }, 'اطلاع كامل على جميع أقسام النظام')
                            )
                        )
                    ),
                    
                    // Navigation Tabs
                    h('div', { className: 'flex gap-3 mb-8 overflow-x-auto pb-2' },
                        [
                            { id: 'overview', label: '📊 لوحة المعلومات', icon: '📊' },
                            { id: 'new', label: '🐣 المتاجر الجديدة', badge: newMerchants.length },
                            { id: 'active', label: '✅ المتاجر النشطة', badge: activeMerchants.length },
                            { id: 'retention', label: '😴 الاستعادة', badge: inactiveMerchants.length },
                            { id: 'distribution', label: '🔀 التوزيع' },
                            { id: 'users', label: '👥 المستخدمين' }
                        ].map(tab => h('button', {
                            key: tab.id,
                            onClick: () => setCurrentTab(tab.id),
                            className: `px-6 py-3 rounded-xl font-bold whitespace-nowrap ${
                                currentTab === tab.id 
                                    ? 'bg-purple-500 text-white shadow-lg' 
                                    : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'
                            }`
                        },
                            tab.label,
                            tab.badge && h('span', { className: 'ml-2 bg-red-500 text-white px-2 py-1 rounded-full text-xs' }, tab.badge)
                        ))
                    ),

                    // Content
                    currentTab === 'overview' && h(GeneralManagerOverview, { newMerchants, activeMerchants, inactiveMerchants, allUsers }),
                    currentTab === 'new' && h(NewMerchantsOfficerView, { merchants: newMerchants, setMerchants: setNewMerchants, currentUser }),
                    currentTab === 'active' && h(ActiveMerchantsOfficerView, { merchants: activeMerchants, setMerchants: setActiveMerchants, currentUser }),
                    currentTab === 'retention' && h(RetentionOfficerView, { merchants: inactiveMerchants, setMerchants: setInactiveMerchants, currentUser }),
                    currentTab === 'distribution' && h(ManagerDistribution, { newMerchants, activeMerchants, inactiveMerchants, officers: allUsers.filter(u => u.role !== ROLES.GENERAL_MANAGER), assignMerchant: (id, userId, type) => {
                        const setter = type === 'new' ? setNewMerchants : type === 'active' ? setActiveMerchants : setInactiveMerchants;
                        const merchants = type === 'new' ? newMerchants : type === 'active' ? activeMerchants : inactiveMerchants;
                        setter(merchants.map(m => m.id === id ? { ...m, assigned_to: userId } : m));
                    }}),
                    currentTab === 'users' && h(UsersManagement, { allUsers, setAllUsers })
                )
            );
        }

        // General Manager Overview
        function GeneralManagerOverview({ newMerchants, activeMerchants, inactiveMerchants, allUsers }) {
            const goldenCount = newMerchants.filter(m => m.is_golden && !m.contacted).length;
            const contactedCount = newMerchants.filter(m => m.contacted).length;
            const surveyNeededCount = activeMerchants.filter(m => m.needs_survey).length;

            return h('div', { className: 'space-y-6' },
                // Main Stats
                h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-6' },
                    [
                        { label: 'المتاجر الجديدة', value: newMerchants.length, color: 'blue', icon: '🐣', desc: `منها ${goldenCount} فرصة ذهبية` },
                        { label: 'المتاجر النشطة', value: activeMerchants.length, color: 'green', icon: '✅', desc: `${surveyNeededCount} يحتاج استبيان` },
                        { label: 'قيد الاستعادة', value: inactiveMerchants.length, color: 'orange', icon: '😴', desc: 'متاجر متوقفة' },
                        { label: 'إجمالي الموظفين', value: allUsers.length, color: 'purple', icon: '👥', desc: 'موظفين نشطين' }
                    ].map((stat, i) => h('div', {
                        key: i,
                        className: `bg-${stat.color}-50 dark:bg-${stat.color}-900/20 p-6 rounded-2xl text-center hover:shadow-lg transition-shadow`
                    },
                        h('div', { className: 'text-5xl mb-3' }, stat.icon),
                        h('div', { className: `text-4xl font-bold text-${stat.color}-600 dark:text-${stat.color}-400 mb-1` }, stat.value),
                        h('div', { className: 'text-sm font-bold text-gray-900 dark:text-white mb-1' }, stat.label),
                        h('div', { className: 'text-xs text-gray-600 dark:text-gray-400' }, stat.desc)
                    ))
                ),

                // Golden Opportunities Alert
                goldenCount > 0 && h('div', { className: 'bg-gradient-to-r from-yellow-400 to-yellow-500 p-6 rounded-2xl shadow-xl' },
                    h('div', { className: 'flex items-center gap-4' },
                        h('span', { className: 'text-6xl' }, '⭐'),
                        h('div', null,
                            h('h2', { className: 'text-2xl font-bold text-yellow-900 mb-1' }, 'تنبيه: فرص ذهبية!'),
                            h('p', { className: 'text-yellow-800' }, `يوجد ${goldenCount} متجر جديد سجّل خلال آخر ساعة - يحتاج اتصال فوري`)
                        )
                    )
                ),

                // Quick Actions
                h('div', { className: 'grid grid-cols-3 gap-6' },
                    h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg' },
                        h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-4' }, 'المتاجر الجديدة'),
                        h('div', { className: 'space-y-2 text-sm' },
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'فرص ذهبية'),
                                h('span', { className: 'font-bold text-yellow-600' }, goldenCount)
                            ),
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'تم التواصل'),
                                h('span', { className: 'font-bold text-green-600' }, contactedCount)
                            ),
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'في الانتظار'),
                                h('span', { className: 'font-bold text-blue-600' }, newMerchants.length - contactedCount)
                            )
                        )
                    ),
                    h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg' },
                        h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-4' }, 'المتاجر النشطة'),
                        h('div', { className: 'space-y-2 text-sm' },
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'يحتاج استبيان'),
                                h('span', { className: 'font-bold text-orange-600' }, surveyNeededCount)
                            ),
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'مكتمل'),
                                h('span', { className: 'font-bold text-green-600' }, activeMerchants.length - surveyNeededCount)
                            )
                        )
                    ),
                    h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg' },
                        h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-4' }, 'الاستعادة'),
                        h('div', { className: 'space-y-2 text-sm' },
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'محاولة 1'),
                                h('span', { className: 'font-bold text-orange-600' }, inactiveMerchants.filter(m => m.retention_attempts === 0).length)
                            ),
                            h('div', { className: 'flex justify-between' },
                                h('span', { className: 'text-gray-600 dark:text-gray-400' }, 'محاولة 2-3'),
                                h('span', { className: 'font-bold text-red-600' }, inactiveMerchants.filter(m => m.retention_attempts > 0).length)
                            )
                        )
                    )
                )
            );
        }

        // Users Management
        function UsersManagement({ allUsers, setAllUsers }) {
            return h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg' },
                h('h2', { className: 'text-2xl font-bold text-gray-900 dark:text-white mb-6' }, 'إدارة المستخدمين'),
                h('div', { className: 'space-y-3' },
                    allUsers.map(user => h('div', {
                        key: user.id,
                        className: 'flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl'
                    },
                        h('div', null,
                            h('p', { className: 'font-bold text-gray-900 dark:text-white' }, user.name),
                            h('p', { className: 'text-sm text-gray-600 dark:text-gray-400' }, ROLE_LABELS[user.role]),
                            h('p', { className: 'text-xs text-gray-500 dark:text-gray-500' }, `اسم المستخدم: ${user.username}`)
                        ),
                        h('div', { className: 'flex gap-2' },
                            user.role === ROLES.GENERAL_MANAGER && h('span', { className: 'bg-purple-100 dark:bg-purple-900/30 text-purple-800 dark:text-purple-300 px-3 py-1 rounded-full text-xs font-bold' }, '👑 مدير عام')
                        )
                    ))
                ),
                h('button', {
                    className: 'mt-6 w-full bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-all'
                }, '➕ إضافة مستخدم جديد')
            );
        }
        function NewMerchantsOfficerView({ merchants, setMerchants, currentUser }) {
            const [showContactModal, setShowContactModal] = useState(null);

            const goldenMerchants = merchants.filter(m => m.is_golden && !m.contacted);
            const regularMerchants = merchants.filter(m => !m.is_golden && !m.contacted);
            const contactedMerchants = merchants.filter(m => m.contacted);

            const confirmContact = (merchantId, notes) => {
                setMerchants(merchants.map(m => 
                    m.id === merchantId 
                        ? { ...m, contacted: true, contact_notes: [...m.contact_notes, { officer: currentUser.name, notes, date: new Date().toISOString() }] }
                        : m
                ));
                setShowContactModal(null);
            };

            return h('div', { className: 'flex-1 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('h1', { className: 'text-3xl font-bold text-gray-900 dark:text-white mb-2' }, 'المتاجر الجديدة - مهام اليوم'),
                    h('p', { className: 'text-gray-600 dark:text-gray-400 mb-8' }, 'قم بالتواصل مع المتاجر الجديدة وإثبات المكالمة'),
                    
                    // Golden Opportunities
                    goldenMerchants.length > 0 && h('div', { className: 'mb-8' },
                        h('div', { className: 'bg-gradient-to-r from-yellow-400 to-yellow-500 p-6 rounded-2xl shadow-xl mb-4' },
                            h('div', { className: 'flex items-center gap-3' },
                                h('span', { className: 'text-5xl' }, '⭐'),
                                h('div', null,
                                    h('h2', { className: 'text-2xl font-bold text-yellow-900' }, 'فرص ذهبية!'),
                                    h('p', { className: 'text-yellow-800' }, `${goldenMerchants.length} متجر سجّل خلال آخر ساعة - اتصل فوراً!`)
                                )
                            )
                        ),
                        h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                            goldenMerchants.map(m => h(MerchantCard, { 
                                key: m.id, 
                                merchant: m, 
                                type: 'golden',
                                onContact: () => setShowContactModal(m)
                            }))
                        )
                    ),

                    // Regular New Merchants
                    regularMerchants.length > 0 && h('div', { className: 'mb-8' },
                        h('h2', { className: 'text-xl font-bold text-gray-900 dark:text-white mb-4' }, 
                            `متاجر جديدة (${regularMerchants.length})`
                        ),
                        h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                            regularMerchants.map(m => h(MerchantCard, { 
                                key: m.id, 
                                merchant: m, 
                                type: 'new',
                                onContact: () => setShowContactModal(m)
                            }))
                        )
                    ),

                    // Contacted
                    contactedMerchants.length > 0 && h('div', null,
                        h('h2', { className: 'text-xl font-bold text-gray-900 dark:text-white mb-4' }, 
                            `تم التواصل (${contactedMerchants.length})`
                        ),
                        h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                            contactedMerchants.map(m => h(MerchantCard, { 
                                key: m.id, 
                                merchant: m, 
                                type: 'contacted',
                                onContact: null
                            }))
                        )
                    ),

                    showContactModal && h(ContactModal, {
                        merchant: showContactModal,
                        onClose: () => setShowContactModal(null),
                        onConfirm: confirmContact
                    })
                )
            );
        }

        // ACTIVE MERCHANTS OFFICER VIEW
        function ActiveMerchantsOfficerView({ merchants, setMerchants, currentUser }) {
            const [showSurveyModal, setShowSurveyModal] = useState(null);

            const needsSurvey = merchants.filter(m => m.needs_survey);

            const submitSurvey = (merchantId, responses) => {
                setMerchants(merchants.map(m => 
                    m.id === merchantId 
                        ? { ...m, needs_survey: false, survey_responses: [...m.survey_responses, { officer: currentUser.name, responses, date: new Date().toISOString() }] }
                        : m
                ));
                setShowSurveyModal(null);
            };

            return h('div', { className: 'flex-1 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('h1', { className: 'text-3xl font-bold text-gray-900 dark:text-white mb-2' }, 'المتاجر النشطة - الاستبيانات'),
                    h('p', { className: 'text-gray-600 dark:text-gray-400 mb-8' }, 
                        `${needsSurvey.length} متجر يحتاج لاستبيان شهري`
                    ),
                    
                    h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                        needsSurvey.map(m => h(MerchantCard, { 
                            key: m.id, 
                            merchant: m, 
                            type: 'active',
                            onSurvey: () => setShowSurveyModal(m)
                        }))
                    ),

                    showSurveyModal && h(SurveyModal, {
                        merchant: showSurveyModal,
                        onClose: () => setShowSurveyModal(null),
                        onSubmit: submitSurvey
                    })
                )
            );
        }

        // RETENTION OFFICER VIEW
        function RetentionOfficerView({ merchants, setMerchants, currentUser }) {
            const [showRetentionModal, setShowRetentionModal] = useState(null);

            const recordAttempt = (merchantId, notes) => {
                setMerchants(merchants.map(m => 
                    m.id === merchantId 
                        ? { ...m, retention_attempts: m.retention_attempts + 1, retention_notes: [...m.retention_notes, { officer: currentUser.name, notes, date: new Date().toISOString() }] }
                        : m
                ));
                setShowRetentionModal(null);
            };

            return h('div', { className: 'flex-1 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('h1', { className: 'text-3xl font-bold text-gray-900 dark:text-white mb-2' }, 'الاستعادة - المتاجر المتوقفة'),
                    h('p', { className: 'text-gray-600 dark:text-gray-400 mb-8' }, 
                        `${merchants.length} متجر يحتاج لمحاولة استعادة`
                    ),
                    
                    h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                        merchants.map(m => h(MerchantCard, { 
                            key: m.id, 
                            merchant: m, 
                            type: 'retention',
                            onRetention: () => setShowRetentionModal(m)
                        }))
                    ),

                    showRetentionModal && h(RetentionModal, {
                        merchant: showRetentionModal,
                        onClose: () => setShowRetentionModal(null),
                        onRecord: recordAttempt
                    })
                )
            );
        }

        // MANAGER VIEW (Distribution + Stats)
        function ManagerView({ newMerchants, setNewMerchants, activeMerchants, setActiveMerchants, inactiveMerchants, setInactiveMerchants, allUsers }) {
            const [currentTab, setCurrentTab] = useState('stats'); // stats, distribution

            const officers = allUsers.filter(u => u.role !== ROLES.SALES_MANAGER);

            const assignMerchant = (merchantId, userId, type) => {
                const setter = type === 'new' ? setNewMerchants : type === 'active' ? setActiveMerchants : setInactiveMerchants;
                const merchants = type === 'new' ? newMerchants : type === 'active' ? activeMerchants : inactiveMerchants;
                
                setter(merchants.map(m => 
                    m.id === merchantId ? { ...m, assigned_to: userId } : m
                ));
            };

            return h('div', { className: 'flex-1 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('h1', { className: 'text-3xl font-bold text-gray-900 dark:text-white mb-8' }, 'لوحة مدير المبيعات'),
                    
                    // Tabs
                    h('div', { className: 'flex gap-4 mb-8' },
                        h('button', {
                            onClick: () => setCurrentTab('stats'),
                            className: `px-6 py-3 rounded-xl font-bold ${currentTab === 'stats' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'}`
                        }, '📊 الإحصائيات'),
                        h('button', {
                            onClick: () => setCurrentTab('distribution'),
                            className: `px-6 py-3 rounded-xl font-bold ${currentTab === 'distribution' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'}`
                        }, '🔀 توزيع المتاجر')
                    ),

                    currentTab === 'stats' ? h(ManagerStats, { newMerchants, activeMerchants, inactiveMerchants })
                        : h(ManagerDistribution, { newMerchants, activeMerchants, inactiveMerchants, officers, assignMerchant })
                )
            );
        }

        // Manager Stats Component
        function ManagerStats({ newMerchants, activeMerchants, inactiveMerchants }) {
            return h('div', { className: 'space-y-6' },
                h('div', { className: 'grid grid-cols-4 gap-6' },
                    [
                        { label: 'جديد', value: newMerchants.length, color: 'blue', icon: '🐣' },
                        { label: 'نشط', value: activeMerchants.length, color: 'green', icon: '✅' },
                        { label: 'استعادة', value: inactiveMerchants.length, color: 'orange', icon: '😴' },
                        { label: 'فرص ذهبية', value: newMerchants.filter(m => m.is_golden && !m.contacted).length, color: 'yellow', icon: '⭐' }
                    ].map((stat, i) => h('div', {
                        key: i,
                        className: `bg-${stat.color}-50 dark:bg-${stat.color}-900/20 p-6 rounded-2xl text-center`
                    },
                        h('div', { className: 'text-5xl mb-3' }, stat.icon),
                        h('div', { className: `text-4xl font-bold text-${stat.color}-600 dark:text-${stat.color}-400 mb-1` }, stat.value),
                        h('div', { className: 'text-sm font-semibold text-gray-600 dark:text-gray-400' }, stat.label)
                    ))
                )
            );
        }

        // Manager Distribution Component
        function ManagerDistribution({ newMerchants, activeMerchants, inactiveMerchants, officers, assignMerchant }) {
            return h('div', { className: 'space-y-6' },
                h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg' },
                    h('h2', { className: 'text-xl font-bold mb-4 text-gray-900 dark:text-white' }, 'توزيع المتاجر الجديدة'),
                    h('div', { className: 'space-y-3' },
                        newMerchants.slice(0, 10).map(m => h('div', {
                            key: m.id,
                            className: 'flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-xl'
                        },
                            h('span', { className: 'font-semibold text-gray-900 dark:text-white' }, m.name),
                            h('select', {
                                value: m.assigned_to || '',
                                onChange: (e) => assignMerchant(m.id, parseInt(e.target.value) || null, 'new'),
                                className: 'px-3 py-2 rounded-lg border dark:bg-gray-600 dark:text-white'
                            },
                                h('option', { value: '' }, 'غير مخصص'),
                                officers.filter(o => o.role === ROLES.NEW_MERCHANTS).map(o => 
                                    h('option', { key: o.id, value: o.id }, o.name)
                                )
                            )
                        ))
                    )
                )
            );
        }

        // Merchant Card Component
        function MerchantCard({ merchant, type, onContact, onSurvey, onRetention }) {
            const openWhatsApp = () => {
                const waPhone = merchant.phone.replace(/^0/, '966');
                window.open(`https://wa.me/${waPhone}`, '_blank');
            };

            const borderColor = type === 'golden' ? 'border-yellow-500' : 
                                type === 'new' ? 'border-blue-500' :
                                type === 'active' ? 'border-green-500' :
                                type === 'retention' ? 'border-orange-500' :
                                'border-gray-300';

            return h('div', {
                className: `bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border-r-4 ${borderColor} ${type === 'contacted' ? 'opacity-60' : ''}`
            },
                h('div', { className: 'flex items-start justify-between mb-4' },
                    h('div', { className: 'flex-1' },
                        h('div', { className: 'flex items-center gap-2 mb-2' },
                            h('span', { className: 'bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-xs font-bold text-gray-600 dark:text-gray-300' }, 
                                `#${merchant.customer_id}`
                            ),
                            h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white' }, merchant.name)
                        ),
                        h('p', { className: 'text-sm text-gray-600 dark:text-gray-400 mb-2' }, `📱 ${merchant.phone}`),
                        merchant.minutes_since_registration !== undefined && h('p', { 
                            className: `text-xs font-bold ${merchant.is_golden ? 'text-yellow-600' : 'text-gray-500'}` 
                        }, `⏱️ منذ ${merchant.minutes_since_registration} دقيقة`)
                    ),
                    type === 'golden' && h('span', { className: 'text-3xl' }, '⭐')
                ),
                h('div', { className: 'flex gap-2' },
                    h('button', {
                        onClick: openWhatsApp,
                        className: 'flex-1 bg-green-500 text-white px-4 py-2 rounded-xl font-bold text-sm'
                    }, '💬'),
                    onContact && h('button', {
                        onClick: onContact,
                        className: 'flex-1 bg-blue-500 text-white px-4 py-2 rounded-xl font-bold text-sm'
                    }, '✅ إثبات التواصل'),
                    onSurvey && h('button', {
                        onClick: onSurvey,
                        className: 'flex-1 bg-blue-500 text-white px-4 py-2 rounded-xl font-bold text-sm'
                    }, '📝 استبيان'),
                    onRetention && h('button', {
                        onClick: onRetention,
                        className: 'flex-1 bg-orange-500 text-white px-4 py-2 rounded-xl font-bold text-sm'
                    }, `🔄 محاولة ${merchant.retention_attempts + 1}`)
                )
            );
        }

        // Contact Modal
        function ContactModal({ merchant, onClose, onConfirm }) {
            const [notes, setNotes] = useState('');

            return h('div', {
                className: 'fixed inset-0 bg-black/60 flex items-center justify-center z-50',
                onClick: onClose
            },
                h('div', {
                    className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-lg w-full m-4',
                    onClick: (e) => e.stopPropagation()
                },
                    h('h2', { className: 'text-2xl font-bold mb-4 text-gray-900 dark:text-white' }, `إثبات التواصل: ${merchant.name}`),
                    h('textarea', {
                        value: notes,
                        onChange: (e) => setNotes(e.target.value),
                        placeholder: 'ملاحظات المكالمة (إلزامي - 10 أحرف على الأقل)',
                        rows: 4,
                        className: 'w-full p-3 border-2 rounded-xl mb-4 dark:bg-gray-700 dark:text-white'
                    }),
                    h('div', { className: 'flex gap-3' },
                        h('button', {
                            onClick: () => notes.length >= 10 && onConfirm(merchant.id, notes),
                            disabled: notes.length < 10,
                            className: 'flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold disabled:opacity-50'
                        }, '✅ تأكيد التواصل'),
                        h('button', {
                            onClick: onClose,
                            className: 'px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold'
                        }, 'إلغاء')
                    )
                )
            );
        }

        // Survey Modal
        function SurveyModal({ merchant, onClose, onSubmit }) {
            const [responses, setResponses] = useState({ speed: 0, finance: 0, support: 0, returns: 0, trust: 0 });
            const questions = ['السرعة', 'التمويل', 'الدعم', 'المرتجعات', 'الثقة'];

            return h('div', {
                className: 'fixed inset-0 bg-black/60 flex items-center justify-center z-50',
                onClick: onClose
            },
                h('div', {
                    className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-lg w-full m-4',
                    onClick: (e) => e.stopPropagation()
                },
                    h('h2', { className: 'text-2xl font-bold mb-4 text-gray-900 dark:text-white' }, `استبيان: ${merchant.name}`),
                    h('div', { className: 'space-y-3 mb-4' },
                        Object.keys(responses).map((key, i) => h('div', { key },
                            h('label', { className: 'block text-sm font-bold mb-2 text-gray-900 dark:text-white' }, questions[i]),
                            h('div', { className: 'flex gap-2' },
                                [1,2,3,4,5].map(val => h('button', {
                                    key: val,
                                    onClick: () => setResponses({...responses, [key]: val}),
                                    className: `flex-1 py-2 rounded font-bold ${responses[key] === val ? 'bg-green-500 text-white' : 'bg-gray-200 dark:bg-gray-700'}`
                                }, val))
                            )
                        ))
                    ),
                    h('div', { className: 'flex gap-3' },
                        h('button', {
                            onClick: () => Object.values(responses).every(v => v > 0) && onSubmit(merchant.id, responses),
                            disabled: !Object.values(responses).every(v => v > 0),
                            className: 'flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold disabled:opacity-50'
                        }, '💾 حفظ'),
                        h('button', {
                            onClick: onClose,
                            className: 'px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold'
                        }, 'إلغاء')
                    )
                )
            );
        }

        // Retention Modal
        function RetentionModal({ merchant, onClose, onRecord }) {
            const [notes, setNotes] = useState('');

            return h('div', {
                className: 'fixed inset-0 bg-black/60 flex items-center justify-center z-50',
                onClick: onClose
            },
                h('div', {
                    className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-lg w-full m-4',
                    onClick: (e) => e.stopPropagation()
                },
                    h('h2', { className: 'text-2xl font-bold mb-4 text-gray-900 dark:text-white' }, 
                        `محاولة استعادة ${merchant.retention_attempts + 1}: ${merchant.name}`
                    ),
                    h('textarea', {
                        value: notes,
                        onChange: (e) => setNotes(e.target.value),
                        placeholder: 'ملاحظات محاولة الاستعادة',
                        rows: 4,
                        className: 'w-full p-3 border-2 rounded-xl mb-4 dark:bg-gray-700 dark:text-white'
                    }),
                    h('div', { className: 'flex gap-3' },
                        h('button', {
                            onClick: () => notes.length >= 10 && onRecord(merchant.id, notes),
                            disabled: notes.length < 10,
                            className: 'flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold disabled:opacity-50'
                        }, '📝 تسجيل المحاولة'),
                        h('button', {
                            onClick: onClose,
                            className: 'px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold'
                        }, 'إلغاء')
                    )
                )
            );
        }

        // Mount App
        const root = createRoot(document.getElementById('app'));
        root.render(h(App));
    </script>
</body>
</html>
