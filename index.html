<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النورس CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .dark { background-color: #111827; }
        .dark body { background-color: #111827; color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-gray-600">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import React from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const { createElement: h, useState, useEffect } = React;

        // Test if everything loaded
        console.log('React loaded:', typeof React);
        console.log('ReactDOM loaded:', typeof ReactDOM);

        function App() {
            const [user, setUser] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('crm_user');
                if (saved) {
                    try {
                        setUser(JSON.parse(saved));
                    } catch (e) {
                        localStorage.removeItem('crm_user');
                    }
                }
            }, []);

            const login = (username, password) => {
                const users = [
                    { id: 1, username: 'admin', password: 'admin123', name: 'المدير العام', role: 'admin' },
                    { id: 2, username: 'manager', password: '123', name: 'مدير المبيعات', role: 'manager' },
                    { id: 3, username: 'new_officer', password: '123', name: 'موظف الجديد', role: 'new' },
                    { id: 4, username: 'active_officer', password: '123', name: 'موظف النشط', role: 'active' },
                    { id: 5, username: 'retention_officer', password: '123', name: 'موظف الاستعادة', role: 'retention' }
                ];

                const found = users.find(u => u.username === username && u.password === password);
                if (found) {
                    setUser(found);
                    localStorage.setItem('crm_user', JSON.stringify(found));
                    return true;
                }
                return false;
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('crm_user');
            };

            if (!user) {
                return h(LoginPage, { onLogin: login });
            }

            return h(Dashboard, { user, onLogout: logout });
        }

        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (onLogin(username, password)) {
                    setError('');
                } else {
                    setError('خطأ في اسم المستخدم أو كلمة المرور');
                }
            };

            return h('div', { className: 'min-h-screen bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center p-4' },
                h('div', { className: 'bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md' },
                    h('div', { className: 'text-center mb-8' },
                        h('div', { className: 'w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 text-4xl' }, '🦅'),
                        h('h1', { className: 'text-3xl font-bold text-gray-900 mb-2' }, 'النورس CRM'),
                        h('p', { className: 'text-gray-600' }, 'نظام إدارة المتاجر')
                    ),
                    error && h('div', { className: 'mb-4 p-3 bg-red-100 text-red-800 rounded-xl text-sm font-semibold' }, error),
                    h('form', { onSubmit: handleSubmit, className: 'space-y-4' },
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, 'اسم المستخدم'),
                            h('input', {
                                type: 'text',
                                value: username,
                                onChange: (e) => setUsername(e.target.value),
                                required: true,
                                className: 'w-full px-4 py-3 border-2 rounded-xl focus:border-blue-500 outline-none'
                            })
                        ),
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, 'كلمة المرور'),
                            h('input', {
                                type: 'password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                required: true,
                                className: 'w-full px-4 py-3 border-2 rounded-xl focus:border-blue-500 outline-none'
                            })
                        ),
                        h('button', {
                            type: 'submit',
                            className: 'w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:from-blue-600 hover:to-blue-700 transition-all shadow-lg'
                        }, 'تسجيل الدخول')
                    ),
                    h('div', { className: 'mt-6 pt-6 border-t' },
                        h('p', { className: 'text-xs text-gray-500 text-center mb-3' }, 'حسابات تجريبية:'),
                        h('div', { className: 'grid grid-cols-1 gap-2 text-xs' },
                            h('div', { className: 'bg-gradient-to-r from-purple-500 to-purple-600 text-white p-2 rounded text-center font-bold' }, '👑 admin / admin123'),
                            h('div', { className: 'bg-gray-50 p-2 rounded text-center' }, 'manager / 123'),
                            h('div', { className: 'bg-gray-50 p-2 rounded text-center' }, 'new_officer / 123')
                        )
                    )
                )
            );
        }

        function Dashboard({ user, onLogout }) {
            const [loading, setLoading] = useState(true);
            const [newMerchants, setNewMerchants] = useState([]);
            const [inactiveMerchants, setInactiveMerchants] = useState([]);
            const [activeMerchants, setActiveMerchants] = useState([]);

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    // Fetch new merchants
                    const newRes = await fetch('/.netlify/functions/new-customers?days=30');
                    const newData = await newRes.json();
                    if (newData.success) {
                        setNewMerchants(newData.data || []);
                    }

                    // Fetch inactive
                    const inactiveRes = await fetch('/.netlify/functions/inactive-customers?days=10');
                    const inactiveData = await inactiveRes.json();
                    if (inactiveData.success) {
                        setInactiveMerchants(inactiveData.data || []);
                    }

                    // Mock active merchants
                    setActiveMerchants(Array.from({ length: 50 }, (_, i) => ({
                        id: 3000 + i,
                        name: `متجر نشط ${i + 1}`,
                        phone: `0${930000000 + i}`
                    })));

                } catch (error) {
                    console.error('Error:', error);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return h('div', { className: 'min-h-screen flex items-center justify-center' },
                    h('div', { className: 'text-center' },
                        h('div', { className: 'w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4' }),
                        h('p', { className: 'text-gray-600' }, 'جاري تحميل البيانات...')
                    )
                );
            }

            return h('div', { className: 'min-h-screen bg-gray-100 p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    // Header
                    h('div', { className: 'bg-gradient-to-r from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-xl mb-8' },
                        h('div', { className: 'flex items-center justify-between' },
                            h('div', { className: 'flex items-center gap-4' },
                                h('div', { className: 'text-6xl' }, '🦅'),
                                h('div', null,
                                    h('h1', { className: 'text-3xl font-bold mb-1' }, 'النورس CRM'),
                                    h('p', { className: 'text-purple-100' }, `مرحباً ${user.name}`)
                                )
                            ),
                            h('button', {
                                onClick: onLogout,
                                className: 'bg-white/20 hover:bg-white/30 px-6 py-3 rounded-xl font-bold transition-all'
                            }, '🚪 تسجيل خروج')
                        )
                    ),

                    // Stats
                    h('div', { className: 'grid grid-cols-3 gap-6 mb-8' },
                        h(StatCard, { label: 'المتاجر الجديدة', value: newMerchants.length, color: 'blue', icon: '🐣' }),
                        h(StatCard, { label: 'المتاجر النشطة', value: activeMerchants.length, color: 'green', icon: '✅' }),
                        h(StatCard, { label: 'المتاجر الخاملة', value: inactiveMerchants.length, color: 'orange', icon: '😴' })
                    ),

                    // Lists
                    h('div', { className: 'grid grid-cols-2 gap-6' },
                        h(MerchantList, { 
                            title: 'المتاجر الجديدة', 
                            merchants: newMerchants.slice(0, 10), 
                            color: 'blue' 
                        }),
                        h(MerchantList, { 
                            title: 'المتاجر الخاملة', 
                            merchants: inactiveMerchants.slice(0, 10), 
                            color: 'orange' 
                        })
                    )
                )
            );
        }

        function StatCard({ label, value, color, icon }) {
            return h('div', { className: `bg-${color}-50 rounded-2xl p-6 text-center shadow-lg` },
                h('div', { className: 'text-5xl mb-3' }, icon),
                h('div', { className: `text-4xl font-bold text-${color}-600 mb-1` }, value),
                h('div', { className: 'text-sm font-semibold text-gray-600' }, label)
            );
        }

        function MerchantList({ title, merchants, color }) {
            return h('div', { className: 'bg-white rounded-2xl shadow-lg p-6' },
                h('h2', { className: 'text-xl font-bold text-gray-900 mb-4' }, title),
                h('div', { className: 'space-y-3' },
                    merchants.length === 0 
                        ? h('p', { className: 'text-gray-500 text-center py-8' }, 'لا توجد بيانات')
                        : merchants.map((m, i) => h('div', {
                            key: i,
                            className: 'flex items-center justify-between p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors'
                        },
                            h('div', null,
                                h('p', { className: 'font-bold text-gray-900' }, m.name || 'غير محدد'),
                                h('p', { className: 'text-sm text-gray-600' }, m.phone || 'لا يوجد')
                            ),
                            h('span', { 
                                className: `text-xs font-bold px-3 py-1 rounded-full bg-${color}-100 text-${color}-800` 
                            }, color === 'blue' ? 'جديد' : 'خامل')
                        ))
                )
            );
        }

        // Mount
        try {
            const root = ReactDOM.createRoot(document.getElementById('app'));
            root.render(h(App));
            console.log('App mounted successfully');
        } catch (error) {
            console.error('Mount error:', error);
            document.getElementById('app').innerHTML = `
                <div style="padding:40px;text-align:center;">
                    <h1 style="color:red;font-size:24px;margin-bottom:20px;">❌ خطأ في التحميل</h1>
                    <p style="color:#666;">${error.message}</p>
                    <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;">🔄 إعادة المحاولة</button>
                </div>
            `;
        }
    </script>
</body>
</html>
