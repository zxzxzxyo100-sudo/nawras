<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النورس CRM - نظام إدارة المتاجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .dark { background-color: #111827; }
        .dark body { background-color: #111827; color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-gray-600">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        const { createElement: h, useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // ROLES
        const ROLES = {
            ADMIN: 'admin',
            MANAGER: 'manager', 
            NEW: 'new',
            ACTIVE: 'active',
            RETENTION: 'retention'
        };

        const ROLE_LABELS = {
            [ROLES.ADMIN]: 'المدير العام',
            [ROLES.MANAGER]: 'مدير المبيعات',
            [ROLES.NEW]: 'مسؤول المتاجر الجديدة',
            [ROLES.ACTIVE]: 'مسؤول المتاجر النشطة',
            [ROLES.RETENTION]: 'مسؤول الاستعادة'
        };

        // Get Users
        function getUsers() {
            const saved = localStorage.getItem('crm_users');
            if (saved) return JSON.parse(saved);
            const defaultUsers = [
                { id: 1, username: 'admin', password: 'admin123', name: 'المدير العام', role: ROLES.ADMIN },
                { id: 2, username: 'manager', password: '123', name: 'مدير المبيعات', role: ROLES.MANAGER },
                { id: 3, username: 'new_officer', password: '123', name: 'أحمد المسؤول', role: ROLES.NEW },
                { id: 4, username: 'active_officer', password: '123', name: 'سارة النشطة', role: ROLES.ACTIVE },
                { id: 5, username: 'retention_officer', password: '123', name: 'محمد الاستعادة', role: ROLES.RETENTION }
            ];
            localStorage.setItem('crm_users', JSON.stringify(defaultUsers));
            return defaultUsers;
        }

        // Main App
        function App() {
            const [user, setUser] = useState(null);
            const [isDark, setIsDark] = useState(false);
            const [allUsers, setAllUsers] = useState(getUsers());
            const [newMerchants, setNewMerchants] = useState([]);
            const [activeMerchants, setActiveMerchants] = useState([]);
            const [inactiveMerchants, setInactiveMerchants] = useState([]);
            const [frozenMerchants, setFrozenMerchants] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('crm_current_user');
                if (saved) {
                    setUser(JSON.parse(saved));
                    fetchData();
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('crm_users', JSON.stringify(allUsers));
            }, [allUsers]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const newRes = await fetch('/.netlify/functions/new-customers?days=30');
                    const newData = await newRes.json();
                    if (newData.success) {
                        const merchants = (newData.data || []).map(m => ({
                            ...m,
                            contacted: false,
                            assigned_to: null,
                            frozen: false
                        }));
                        setNewMerchants(merchants);
                    }

                    const inactiveRes = await fetch('/.netlify/functions/inactive-customers?days=10');
                    const inactiveData = await inactiveRes.json();
                    if (inactiveData.success) {
                        const merchants = (inactiveData.data || []).map(m => ({
                            ...m,
                            retention_attempts: 0,
                            assigned_to: null,
                            frozen: false
                        }));
                        setInactiveMerchants(merchants);
                    }

                    // Mock active
                    setActiveMerchants(Array.from({ length: 50 }, (_, i) => ({
                        id: 3000 + i,
                        customer_id: 3000 + i,
                        name: `متجر نشط ${i + 1}`,
                        phone: `0${930000000 + i}`,
                        needs_survey: Math.random() > 0.7,
                        frozen: false
                    })));
                } catch (error) {
                    console.error('Error:', error);
                } finally {
                    setLoading(false);
                }
            };

            const login = (username, password) => {
                const users = getUsers();
                const found = users.find(u => u.username === username && u.password === password);
                if (found) {
                    setUser(found);
                    localStorage.setItem('crm_current_user', JSON.stringify(found));
                    fetchData();
                    return true;
                }
                return false;
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('crm_current_user');
            };

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
            };

            const freezeMerchant = (id, reason, type) => {
                const setter = type === 'new' ? setNewMerchants : type === 'active' ? setActiveMerchants : setInactiveMerchants;
                const merchants = type === 'new' ? newMerchants : type === 'active' ? activeMerchants : inactiveMerchants;
                const merchant = merchants.find(m => m.id === id);
                if (merchant) {
                    setFrozenMerchants([...frozenMerchants, { ...merchant, frozen: true, freeze_reason: reason }]);
                    setter(merchants.filter(m => m.id !== id));
                }
            };

            if (!user) {
                return h(LoginPage, { onLogin: login });
            }

            const isManager = user.role === ROLES.ADMIN || user.role === ROLES.MANAGER;

            return h('div', { className: 'flex min-h-screen bg-gray-50 dark:bg-gray-900' },
                h(Sidebar, { user, isDark, toggleTheme, onLogout: logout }),
                h('main', { className: 'flex-1' },
                    isManager 
                        ? h(ManagerView, { 
                            user, allUsers, setAllUsers, 
                            newMerchants, setNewMerchants,
                            activeMerchants, setActiveMerchants,
                            inactiveMerchants, setInactiveMerchants,
                            frozenMerchants, freezeMerchant, loading 
                        })
                        : user.role === ROLES.NEW ? h(NewMerchantsView, { user, merchants: newMerchants, setMerchants: setNewMerchants, freezeMerchant })
                        : user.role === ROLES.ACTIVE ? h(ActiveMerchantsView, { user, merchants: activeMerchants, setMerchants: setActiveMerchants, freezeMerchant })
                        : h(RetentionView, { user, merchants: inactiveMerchants, setMerchants: setInactiveMerchants, freezeMerchant })
                )
            );
        }

        // Login Page
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (onLogin(username, password)) {
                    setError('');
                } else {
                    setError('اسم المستخدم أو كلمة المرور غير صحيحة');
                }
            };

            return h('div', { className: 'min-h-screen bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center p-4' },
                h('div', { className: 'bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md' },
                    h('div', { className: 'text-center mb-8' },
                        h('div', { className: 'w-20 h-20 bg-blue-500 rounded-2xl mx-auto flex items-center justify-center mb-4 text-4xl' }, '🦅'),
                        h('h1', { className: 'text-3xl font-bold mb-2' }, 'النورس CRM'),
                        h('p', { className: 'text-gray-600' }, 'نظام إدارة المتاجر')
                    ),
                    error && h('div', { className: 'mb-4 p-3 bg-red-100 text-red-800 rounded-xl text-sm' }, error),
                    h('form', { onSubmit: handleSubmit, className: 'space-y-4' },
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold mb-2' }, 'اسم المستخدم'),
                            h('input', { type: 'text', value: username, onChange: e => setUsername(e.target.value), className: 'w-full px-4 py-3 border-2 rounded-xl', required: true })
                        ),
                        h('div', null,
                            h('label', { className: 'block text-sm font-bold mb-2' }, 'كلمة المرور'),
                            h('input', { type: 'password', value: password, onChange: e => setPassword(e.target.value), className: 'w-full px-4 py-3 border-2 rounded-xl', required: true })
                        ),
                        h('button', { type: 'submit', className: 'w-full bg-blue-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-600' }, 'تسجيل الدخول')
                    ),
                    h('div', { className: 'mt-6 text-xs text-center text-gray-500' },
                        h('p', { className: 'mb-2' }, 'حسابات تجريبية:'),
                        h('div', { className: 'bg-purple-100 p-2 rounded font-bold' }, '👑 admin / admin123')
                    )
                )
            );
        }

        // Sidebar
        function Sidebar({ user, isDark, toggleTheme, onLogout }) {
            return h('aside', { className: 'w-72 bg-white dark:bg-gray-800 border-l flex flex-col shadow-lg' },
                h('div', { className: 'p-6 border-b' },
                    h('div', { className: 'flex items-center gap-3 mb-4' },
                        h('div', { className: 'w-12 h-12 bg-blue-500 rounded-xl flex items-center justify-center text-2xl' }, '🦅'),
                        h('div', null,
                            h('h1', { className: 'text-xl font-bold' }, 'النورس CRM'),
                            h('p', { className: 'text-xs text-gray-500' }, 'إدارة المتاجر')
                        )
                    ),
                    h('div', { className: user.role === ROLES.ADMIN ? 'bg-gradient-to-r from-purple-500 to-purple-600 p-3 rounded-xl text-white' : 'bg-blue-50 p-3 rounded-xl' },
                        user.role === ROLES.ADMIN && h('div', { className: 'flex items-center gap-2 mb-1' },
                            h('span', null, '👑'),
                            h('span', { className: 'text-xs font-bold' }, 'صلاحيات كاملة')
                        ),
                        h('p', { className: 'text-sm font-bold' }, user.name),
                        h('p', { className: 'text-xs opacity-90' }, ROLE_LABELS[user.role])
                    )
                ),
                h('div', { className: 'flex-1' }),
                h('div', { className: 'p-4 border-t space-y-3' },
                    h('button', { onClick: toggleTheme, className: 'w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50 hover:bg-gray-100' },
                        h('span', { className: 'text-2xl' }, isDark ? '☀️' : '🌙'),
                        h('span', { className: 'font-semibold' }, isDark ? 'نهاري' : 'ليلي')
                    ),
                    h('button', { onClick: onLogout, className: 'w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-50 text-red-600 hover:bg-red-100 font-semibold' },
                        h('span', { className: 'text-2xl' }, '🚪'),
                        h('span', null, 'خروج')
                    )
                )
            );
        }

        // Manager View
        function ManagerView({ user, allUsers, setAllUsers, newMerchants, activeMerchants, inactiveMerchants, frozenMerchants, loading }) {
            const [tab, setTab] = useState('overview');

            const tabs = [
                { id: 'overview', label: '📊 لوحة المعلومات' },
                { id: 'new', label: '🐣 الجديدة', badge: newMerchants.length },
                { id: 'active', label: '✅ النشطة', badge: activeMerchants.length },
                { id: 'inactive', label: '😴 الخاملة', badge: inactiveMerchants.length },
                { id: 'frozen', label: '❄️ المجمدة', badge: frozenMerchants.length },
                { id: 'users', label: '👥 المستخدمين' }
            ];

            return h('div', { className: 'p-8' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('div', { className: 'bg-gradient-to-r from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-xl mb-8' },
                        h('div', { className: 'flex items-center gap-4' },
                            h('div', { className: 'text-6xl' }, '👑'),
                            h('div', null,
                                h('h1', { className: 'text-3xl font-bold mb-1' }, user.role === ROLES.ADMIN ? 'المدير العام' : 'مدير المبيعات'),
                                h('p', { className: 'text-purple-100' }, 'اطلاع كامل على النظام')
                            )
                        )
                    ),
                    h('div', { className: 'flex gap-2 mb-8 overflow-x-auto' },
                        tabs.map(t => h('button', {
                            key: t.id,
                            onClick: () => setTab(t.id),
                            className: `px-4 py-2 rounded-xl font-bold whitespace-nowrap ${tab === t.id ? 'bg-purple-500 text-white' : 'bg-white'}`
                        },
                            t.label,
                            t.badge !== undefined && h('span', { className: 'ml-2 bg-red-500 text-white px-2 py-1 rounded-full text-xs' }, t.badge)
                        ))
                    ),
                    
                    loading ? h('div', { className: 'text-center py-12' }, h('div', { className: 'w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto' }))
                    : tab === 'overview' ? h(OverviewTab, { newMerchants, activeMerchants, inactiveMerchants, frozenMerchants })
                    : tab === 'new' ? h(MerchantsList, { title: 'المتاجر الجديدة', merchants: newMerchants, color: 'blue' })
                    : tab === 'active' ? h(MerchantsList, { title: 'المتاجر النشطة', merchants: activeMerchants, color: 'green' })
                    : tab === 'inactive' ? h(MerchantsList, { title: 'المتاجر الخاملة', merchants: inactiveMerchants, color: 'orange' })
                    : tab === 'frozen' ? h(FrozenList, { merchants: frozenMerchants })
                    : h(UsersTab, { allUsers, setAllUsers })
                )
            );
        }

        // Overview Tab
        function OverviewTab({ newMerchants, activeMerchants, inactiveMerchants, frozenMerchants }) {
            return h('div', { className: 'space-y-6' },
                h('div', { className: 'grid grid-cols-4 gap-6' },
                    [
                        { label: 'جديد', value: newMerchants.length, color: 'blue', icon: '🐣' },
                        { label: 'نشط', value: activeMerchants.length, color: 'green', icon: '✅' },
                        { label: 'خامل', value: inactiveMerchants.length, color: 'orange', icon: '😴' },
                        { label: 'مجمد', value: frozenMerchants.length, color: 'gray', icon: '❄️' }
                    ].map((s, i) => h('div', { key: i, className: `bg-${s.color}-50 rounded-2xl p-6 text-center` },
                        h('div', { className: 'text-5xl mb-3' }, s.icon),
                        h('div', { className: `text-4xl font-bold text-${s.color}-600 mb-1` }, s.value),
                        h('div', { className: 'text-sm font-semibold text-gray-600' }, s.label)
                    ))
                )
            );
        }

        // Merchants List
        function MerchantsList({ title, merchants, color }) {
            return h('div', null,
                h('h2', { className: 'text-2xl font-bold mb-4' }, `${title} (${merchants.length})`),
                h('div', { className: 'grid grid-cols-2 gap-4' },
                    merchants.slice(0, 20).map((m, i) => h('div', {
                        key: i,
                        className: 'bg-white rounded-xl p-4 shadow border-r-4 border-' + color + '-500'
                    },
                        h('div', { className: 'flex items-center gap-2 mb-2' },
                            h('span', { className: 'bg-gray-100 px-2 py-1 rounded text-xs font-bold' }, `#${m.customer_id || m.id}`),
                            h('h3', { className: 'font-bold flex-1' }, m.name || 'غير محدد')
                        ),
                        h('p', { className: 'text-sm text-gray-600' }, `📱 ${m.phone}`)
                    ))
                )
            );
        }

        // Frozen List
        function FrozenList({ merchants }) {
            return h('div', null,
                h('h2', { className: 'text-2xl font-bold mb-4' }, `المتاجر المجمدة (${merchants.length})`),
                merchants.length === 0 
                    ? h('div', { className: 'bg-white rounded-2xl p-12 text-center' }, h('div', { className: 'text-6xl mb-4' }, '❄️'), h('p', { className: 'text-gray-600' }, 'لا توجد متاجر مجمدة'))
                    : h('div', { className: 'grid grid-cols-2 gap-4' },
                        merchants.map((m, i) => h('div', { key: i, className: 'bg-white rounded-xl p-4 shadow border-r-4 border-gray-500' },
                            h('h3', { className: 'font-bold mb-2' }, m.name),
                            h('div', { className: 'bg-yellow-50 p-3 rounded-xl' },
                                h('p', { className: 'text-xs font-bold text-yellow-800 mb-1' }, 'سبب التجميد:'),
                                h('p', { className: 'text-sm' }, m.freeze_reason)
                            )
                        ))
                    )
            );
        }

        // Users Tab
        function UsersTab({ allUsers, setAllUsers }) {
            const [showAdd, setShowAdd] = useState(false);
            const [newUser, setNewUser] = useState({ username: '', password: '', name: '', role: ROLES.NEW });

            const addUser = () => {
                if (!newUser.username || !newUser.password || !newUser.name) {
                    alert('املأ جميع الحقول');
                    return;
                }
                const maxId = Math.max(...allUsers.map(u => u.id), 0);
                setAllUsers([...allUsers, { ...newUser, id: maxId + 1 }]);
                setNewUser({ username: '', password: '', name: '', role: ROLES.NEW });
                setShowAdd(false);
                alert('تم الإضافة');
            };

            const deleteUser = (id) => {
                if (allUsers.find(u => u.id === id)?.role === ROLES.ADMIN) {
                    alert('لا يمكن حذف المدير العام');
                    return;
                }
                if (confirm('هل أنت متأكد؟')) {
                    setAllUsers(allUsers.filter(u => u.id !== id));
                }
            };

            return h('div', { className: 'bg-white rounded-2xl p-6 shadow-lg' },
                h('div', { className: 'flex items-center justify-between mb-6' },
                    h('h2', { className: 'text-2xl font-bold' }, 'المستخدمين'),
                    h('button', { onClick: () => setShowAdd(!showAdd), className: 'bg-blue-500 text-white px-4 py-2 rounded-xl font-bold' }, showAdd ? 'إلغاء' : '➕ إضافة')
                ),
                showAdd && h('div', { className: 'mb-6 p-4 bg-blue-50 rounded-xl' },
                    h('div', { className: 'grid grid-cols-2 gap-3' },
                        h('input', { value: newUser.username, onChange: e => setNewUser({...newUser, username: e.target.value}), placeholder: 'اسم المستخدم', className: 'px-3 py-2 rounded-lg border' }),
                        h('input', { type: 'password', value: newUser.password, onChange: e => setNewUser({...newUser, password: e.target.value}), placeholder: 'كلمة المرور', className: 'px-3 py-2 rounded-lg border' }),
                        h('input', { value: newUser.name, onChange: e => setNewUser({...newUser, name: e.target.value}), placeholder: 'الاسم', className: 'px-3 py-2 rounded-lg border' }),
                        h('select', { value: newUser.role, onChange: e => setNewUser({...newUser, role: e.target.value}), className: 'px-3 py-2 rounded-lg border' },
                            Object.entries(ROLE_LABELS).map(([key, label]) => h('option', { key, value: key }, label))
                        )
                    ),
                    h('button', { onClick: addUser, className: 'mt-3 w-full bg-green-500 text-white py-2 rounded-xl font-bold' }, '✅ حفظ')
                ),
                h('div', { className: 'space-y-3' },
                    allUsers.map(u => h('div', { key: u.id, className: 'flex items-center justify-between p-4 bg-gray-50 rounded-xl' },
                        h('div', null,
                            h('p', { className: 'font-bold' }, u.name),
                            h('p', { className: 'text-sm text-gray-600' }, ROLE_LABELS[u.role]),
                            h('p', { className: 'text-xs text-gray-500' }, `@${u.username}`)
                        ),
                        u.role === ROLES.ADMIN 
                            ? h('span', { className: 'bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-xs font-bold' }, '👑 مدير')
                            : h('button', { onClick: () => deleteUser(u.id), className: 'bg-red-500 text-white px-3 py-1 rounded-lg text-sm font-bold' }, '🗑️')
                    ))
                )
            );
        }

        // Simple views for officers
        function NewMerchantsView({ merchants }) {
            return h('div', { className: 'p-8' },
                h('h1', { className: 'text-3xl font-bold mb-6' }, 'المتاجر الجديدة'),
                h(MerchantsList, { title: 'متاجر جديدة', merchants, color: 'blue' })
            );
        }

        function ActiveMerchantsView({ merchants }) {
            return h('div', { className: 'p-8' },
                h('h1', { className: 'text-3xl font-bold mb-6' }, 'المتاجر النشطة'),
                h(MerchantsList, { title: 'متاجر نشطة', merchants, color: 'green' })
            );
        }

        function RetentionView({ merchants }) {
            return h('div', { className: 'p-8' },
                h('h1', { className: 'text-3xl font-bold mb-6' }, 'الاستعادة'),
                h(MerchantsList, { title: 'متاجر خاملة', merchants, color: 'orange' })
            );
        }

        // Mount
        const root = createRoot(document.getElementById('app'));
        root.render(h(App));
    </script>
</body>
</html>
