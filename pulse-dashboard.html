<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Dashboard - مسؤول المتاجر الجديدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        
        /* Golden Pulse Animation */
        @keyframes golden-pulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3); 
                border-color: #FFD700;
            }
            50% { 
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.9), 0 0 90px rgba(255, 215, 0, 0.5); 
                border-color: #FFA500;
            }
        }
        
        .golden-merchant {
            animation: golden-pulse 2s infinite;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFFACD 100%);
            border: 3px solid #FFD700;
        }
        
        /* Hot Merchant Glow */
        @keyframes hot-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 107, 107, 0.7); }
        }
        
        .hot-merchant {
            animation: hot-glow 3s infinite;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFE5E5 100%);
            border: 2px solid #FF6B6B;
        }
        
        /* Timer Pulse */
        @keyframes timer-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .timer-urgent {
            animation: timer-pulse 1s infinite;
            color: #DC2626;
            font-weight: 900;
        }
        
        /* Modal Animation */
        @keyframes modal-slide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-content {
            animation: modal-slide 0.3s ease-out;
        }
        
        /* Clean Feed Success */
        @keyframes fade-out {
            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }
        
        .removing {
            animation: fade-out 0.5s forwards;
        }
        
        /* Priority Badge */
        .badge-golden {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5);
        }
        
        .badge-hot {
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
        }
        
        /* Stats Counter */
        .stat-value {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        const { createElement: h, useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // Utility Functions
        function calculateMinutesSince(dateStr) {
            if (!dateStr) return 9999;
            const date = new Date(dateStr);
            return Math.floor((Date.now() - date.getTime()) / 60000);
        }

        function formatTime(minutes) {
            if (minutes < 60) return `${minutes} دقيقة`;
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            if (hours < 24) return `${hours} ساعة${mins > 0 ? ` و ${mins} دقيقة` : ''}`;
            const days = Math.floor(hours / 24);
            const remainHours = hours % 24;
            return `${days} يوم${remainHours > 0 ? ` و ${remainHours} ساعة` : ''}`;
        }

        function getPriorityLevel(minutes) {
            if (minutes < 60) return 'golden';
            if (minutes < 1440) return 'hot'; // 24 hours
            return 'regular';
        }

        // Icons (Lucide-style SVG)
        const PhoneIcon = () => h('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z' })
        );

        const MessageIcon = () => h('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z' })
        );

        const ClockIcon = () => h('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' })
        );

        const StarIcon = () => h('svg', { className: 'w-6 h-6', fill: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { d: 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z' })
        );

        const FireIcon = () => h('svg', { className: 'w-6 h-6', fill: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { d: 'M12 23a7.5 7.5 0 007.5-7.5c0-2.5-1.5-5-3-6.5.5 1.5.5 3 0 4.5-1.5-2-3-4-3-6.5 0-1.5.5-3 1.5-4.5-2 .5-3.5 2-4.5 4-.5-1.5-.5-3 0-4.5-2.5 1.5-4 4-4 6.5A7.5 7.5 0 0012 23z' })
        );

        const CheckIcon = () => h('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
            h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M5 13l4 4L19 7' })
        );

        // Main App
        function App() {
            const [merchants, setMerchants] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMerchant, setSelectedMerchant] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [stats, setStats] = useState({
                total: 0,
                golden: 0,
                hot: 0,
                regular: 0,
                avgTimeGolden: 0
            });

            useEffect(() => {
                fetchMerchants();
                const interval = setInterval(updateTimers, 30000); // Update every 30s
                return () => clearInterval(interval);
            }, []);

            const fetchMerchants = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/.netlify/functions/new-customers?days=30');
                    const data = await res.json();
                    
                    if (data.success) {
                        // Process merchants
                        const processed = (data.data || [])
                            .map(m => ({
                                ...m,
                                minutes_since: calculateMinutesSince(m.registration_date),
                                priority: getPriorityLevel(calculateMinutesSince(m.registration_date)),
                                contacted: false
                            }))
                            .filter(m => !m.contacted) // Only show non-contacted
                            .sort((a, b) => a.minutes_since - b.minutes_since); // Sort by urgency

                        setMerchants(processed);
                        calculateStats(processed);
                    }
                } catch (error) {
                    console.error('Error fetching merchants:', error);
                } finally {
                    setLoading(false);
                }
            };

            const calculateStats = (merchantList) => {
                const golden = merchantList.filter(m => m.priority === 'golden');
                const hot = merchantList.filter(m => m.priority === 'hot');
                const regular = merchantList.filter(m => m.priority === 'regular');
                
                const avgTimeGolden = golden.length > 0
                    ? Math.floor(golden.reduce((sum, m) => sum + m.minutes_since, 0) / golden.length)
                    : 0;

                setStats({
                    total: merchantList.length,
                    golden: golden.length,
                    hot: hot.length,
                    regular: regular.length,
                    avgTimeGolden
                });
            };

            const updateTimers = () => {
                setMerchants(prev => {
                    const updated = prev.map(m => ({
                        ...m,
                        minutes_since: calculateMinutesSince(m.registration_date),
                        priority: getPriorityLevel(calculateMinutesSince(m.registration_date))
                    }));
                    calculateStats(updated);
                    return updated;
                });
            };

            const handleStartCall = (merchant) => {
                setSelectedMerchant(merchant);
                setShowModal(true);
            };

            const handleCallCompleted = (notes) => {
                if (!notes || notes.length < 10) {
                    alert('يجب إضافة ملاحظات تفصيلية (10 أحرف على الأقل)');
                    return;
                }

                // Mark as removing with animation
                const merchantCard = document.querySelector(`[data-merchant-id="${selectedMerchant.customer_id}"]`);
                if (merchantCard) {
                    merchantCard.classList.add('removing');
                }

                // Remove after animation
                setTimeout(() => {
                    setMerchants(prev => {
                        const updated = prev.filter(m => m.customer_id !== selectedMerchant.customer_id);
                        calculateStats(updated);
                        return updated;
                    });
                    setShowModal(false);
                    setSelectedMerchant(null);
                }, 500);
            };

            const golden = merchants.filter(m => m.priority === 'golden');
            const hot = merchants.filter(m => m.priority === 'hot');
            const regular = merchants.filter(m => m.priority === 'regular');

            if (loading) {
                return h(LoadingScreen);
            }

            return h('div', { className: 'min-h-screen p-6' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    // Header
                    h(Header, { stats }),
                    
                    // Stats Dashboard
                    h(StatsDashboard, { stats }),
                    
                    // Empty State
                    merchants.length === 0 
                        ? h(EmptyState)
                        : h('div', { className: 'space-y-8' },
                            // Golden Merchants
                            golden.length > 0 && h(MerchantSection, {
                                title: 'المتاجر الذهبية',
                                subtitle: 'أولوية قصوى - اتصل خلال 30-60 دقيقة',
                                icon: h(StarIcon),
                                merchants: golden,
                                onStartCall: handleStartCall,
                                color: 'golden'
                            }),
                            
                            // Hot Merchants
                            hot.length > 0 && h(MerchantSection, {
                                title: 'المتاجر الساخنة',
                                subtitle: 'تسجيل حديث - اتصل في أقرب وقت',
                                icon: h(FireIcon),
                                merchants: hot,
                                onStartCall: handleStartCall,
                                color: 'hot'
                            }),
                            
                            // Regular
                            regular.length > 0 && h(MerchantSection, {
                                title: 'المتاجر الجديدة',
                                subtitle: 'تحتاج للتواصل',
                                icon: h(PhoneIcon),
                                merchants: regular,
                                onStartCall: handleStartCall,
                                color: 'regular'
                            })
                        )
                ),
                
                // Call Modal
                showModal && selectedMerchant && h(CallModal, {
                    merchant: selectedMerchant,
                    onClose: () => setShowModal(false),
                    onComplete: handleCallCompleted
                })
            );
        }

        // Loading Screen
        function LoadingScreen() {
            return h('div', { className: 'min-h-screen flex items-center justify-center' },
                h('div', { className: 'text-center' },
                    h('div', { className: 'w-20 h-20 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4' }),
                    h('p', { className: 'text-xl font-bold text-gray-600' }, 'جاري تحميل البيانات...')
                )
            );
        }

        // Header
        function Header({ stats }) {
            return h('div', { className: 'bg-gradient-to-r from-blue-600 to-blue-700 rounded-3xl p-8 text-white shadow-2xl mb-8' },
                h('div', { className: 'flex items-center justify-between' },
                    h('div', null,
                        h('h1', { className: 'text-4xl font-black mb-2 flex items-center gap-3' },
                            h('span', { className: 'text-5xl' }, '⚡'),
                            'Pulse Dashboard'
                        ),
                        h('p', { className: 'text-blue-100 text-lg' }, 'نظام أولويات المتاجر الجديدة')
                    ),
                    h('div', { className: 'text-left' },
                        h('div', { className: 'bg-white/20 backdrop-blur rounded-2xl px-6 py-4' },
                            h('p', { className: 'text-sm text-blue-100 mb-1' }, 'المتاجر قيد الانتظار'),
                            h('p', { className: 'text-5xl font-black' }, stats.total)
                        )
                    )
                )
            );
        }

        // Stats Dashboard
        function StatsDashboard({ stats }) {
            return h('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-6 mb-8' },
                // Golden Count
                h('div', { className: 'bg-gradient-to-br from-yellow-400 to-yellow-500 rounded-2xl p-6 text-white shadow-xl' },
                    h('div', { className: 'flex items-center gap-3 mb-2' },
                        h(StarIcon),
                        h('span', { className: 'text-lg font-bold' }, 'ذهبية')
                    ),
                    h('div', { className: 'stat-value' }, stats.golden),
                    h('p', { className: 'text-sm text-yellow-100 mt-2' }, '< 1 ساعة')
                ),
                
                // Hot Count
                h('div', { className: 'bg-gradient-to-br from-red-500 to-red-600 rounded-2xl p-6 text-white shadow-xl' },
                    h('div', { className: 'flex items-center gap-3 mb-2' },
                        h(FireIcon),
                        h('span', { className: 'text-lg font-bold' }, 'ساخنة')
                    ),
                    h('div', { className: 'stat-value' }, stats.hot),
                    h('p', { className: 'text-sm text-red-100 mt-2' }, '1-24 ساعة')
                ),
                
                // Regular Count
                h('div', { className: 'bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-xl' },
                    h('div', { className: 'flex items-center gap-3 mb-2' },
                        h(PhoneIcon),
                        h('span', { className: 'text-lg font-bold' }, 'عادية')
                    ),
                    h('div', { className: 'stat-value' }, stats.regular),
                    h('p', { className: 'text-sm text-blue-100 mt-2' }, '> 24 ساعة')
                ),
                
                // Avg Time Golden (KPI)
                h('div', { className: 'bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-xl' },
                    h('div', { className: 'flex items-center gap-3 mb-2' },
                        h(ClockIcon),
                        h('span', { className: 'text-lg font-bold' }, 'متوسط الوقت')
                    ),
                    h('div', { className: 'stat-value' }, stats.avgTimeGolden),
                    h('p', { className: 'text-sm text-purple-100 mt-2' }, 'دقيقة للذهبية')
                )
            );
        }

        // Empty State
        function EmptyState() {
            return h('div', { className: 'bg-white rounded-3xl p-16 text-center shadow-lg' },
                h('div', { className: 'text-8xl mb-6' }, '🎉'),
                h('h2', { className: 'text-3xl font-bold text-gray-900 mb-3' }, 'رائع! لا توجد متاجر قيد الانتظار'),
                h('p', { className: 'text-gray-600 text-lg' }, 'تم الاتصال بجميع المتاجر الجديدة')
            );
        }

        // Merchant Section
        function MerchantSection({ title, subtitle, icon, merchants, onStartCall, color }) {
            const bgColors = {
                golden: 'from-yellow-50 to-yellow-100',
                hot: 'from-red-50 to-red-100',
                regular: 'from-blue-50 to-blue-100'
            };

            const textColors = {
                golden: 'text-yellow-900',
                hot: 'text-red-900',
                regular: 'text-blue-900'
            };

            return h('div', null,
                h('div', { className: `bg-gradient-to-r ${bgColors[color]} rounded-2xl p-6 mb-4 border-2 border-${color === 'golden' ? 'yellow' : color === 'hot' ? 'red' : 'blue'}-300` },
                    h('div', { className: 'flex items-center gap-3' },
                        h('div', { className: textColors[color] }, icon),
                        h('div', null,
                            h('h2', { className: `text-2xl font-bold ${textColors[color]}` }, title),
                            h('p', { className: `text-sm ${textColors[color]} opacity-80` }, subtitle)
                        ),
                        h('div', { className: `mr-auto text-4xl font-black ${textColors[color]}` }, merchants.length)
                    )
                ),
                h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                    merchants.map(m => h(MerchantCard, {
                        key: m.customer_id,
                        merchant: m,
                        onStartCall
                    }))
                )
            );
        }

        // Merchant Card
        function MerchantCard({ merchant, onStartCall }) {
            const isUrgent = merchant.minutes_since < 30;
            const cardClass = merchant.priority === 'golden' ? 'golden-merchant' 
                            : merchant.priority === 'hot' ? 'hot-merchant'
                            : 'bg-white border-2 border-blue-200';

            return h('div', {
                'data-merchant-id': merchant.customer_id,
                className: `${cardClass} rounded-2xl p-6 shadow-lg hover:shadow-2xl transition-all cursor-pointer`
            },
                // Header
                h('div', { className: 'flex items-center justify-between mb-4' },
                    h('div', { className: 'flex items-center gap-2' },
                        merchant.priority === 'golden' && h('span', { className: 'badge-golden text-white px-3 py-1 rounded-full text-xs font-bold' }, '⭐ ذهبي'),
                        merchant.priority === 'hot' && h('span', { className: 'badge-hot text-white px-3 py-1 rounded-full text-xs font-bold' }, '🔥 ساخن'),
                        h('span', { className: 'bg-gray-100 px-3 py-1 rounded-full text-xs font-bold text-gray-700' }, 
                            `#${merchant.customer_id}`
                        )
                    ),
                    h('div', { className: `text-right ${isUrgent ? 'timer-urgent' : 'text-gray-600'}` },
                        h('div', { className: 'flex items-center gap-1' },
                            h(ClockIcon),
                            h('span', { className: 'text-sm font-bold' }, formatTime(merchant.minutes_since))
                        )
                    )
                ),
                
                // Merchant Info
                h('div', { className: 'mb-6' },
                    h('h3', { className: 'text-xl font-bold text-gray-900 mb-2' }, 
                        merchant.name || 'متجر جديد'
                    ),
                    h('p', { className: 'text-gray-600 flex items-center gap-2' },
                        h(PhoneIcon),
                        h('span', { className: 'font-semibold' }, merchant.phone || 'لا يوجد')
                    )
                ),
                
                // Action Button
                h('button', {
                    onClick: () => onStartCall(merchant),
                    className: `w-full ${
                        merchant.priority === 'golden' 
                            ? 'bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-600 hover:to-yellow-700'
                            : merchant.priority === 'hot'
                            ? 'bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700'
                            : 'bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700'
                    } text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-all flex items-center justify-center gap-2`
                },
                    h(PhoneIcon),
                    'بدء المكالمة'
                )
            );
        }

        // Call Modal
        function CallModal({ merchant, onClose, onComplete }) {
            const [notes, setNotes] = useState('');
            const [callStarted, setCallStarted] = useState(false);

            const openWhatsApp = () => {
                const waPhone = merchant.phone.replace(/^0/, '966');
                window.open(`https://wa.me/${waPhone}`, '_blank');
            };

            return h('div', { 
                className: 'fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4',
                onClick: onClose
            },
                h('div', {
                    className: 'modal-content bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl',
                    onClick: (e) => e.stopPropagation()
                },
                    // Header
                    h('div', { className: 'flex items-center justify-between mb-6' },
                        h('h2', { className: 'text-3xl font-bold text-gray-900' }, 'مكالمة اليوم صفر'),
                        h('button', {
                            onClick: onClose,
                            className: 'text-gray-400 hover:text-gray-600 text-3xl font-bold'
                        }, '×')
                    ),
                    
                    // Merchant Info Card
                    h('div', { className: 'bg-gradient-to-r from-blue-50 to-blue-100 rounded-2xl p-6 mb-6 border-2 border-blue-200' },
                        h('div', { className: 'flex items-center gap-2 mb-3' },
                            h('span', { className: 'bg-blue-500 text-white px-3 py-1 rounded-full text-sm font-bold' }, 
                                `#${merchant.customer_id}`
                            ),
                            merchant.priority === 'golden' && h('span', { className: 'badge-golden text-white px-3 py-1 rounded-full text-sm font-bold' }, '⭐ ذهبي')
                        ),
                        h('h3', { className: 'text-2xl font-bold text-gray-900 mb-3' }, 
                            merchant.name || 'متجر جديد'
                        ),
                        h('div', { className: 'grid grid-cols-2 gap-4' },
                            h('div', null,
                                h('p', { className: 'text-sm text-gray-600 mb-1' }, 'رقم الجوال'),
                                h('p', { className: 'text-lg font-bold text-gray-900' }, merchant.phone)
                            ),
                            h('div', null,
                                h('p', { className: 'text-sm text-gray-600 mb-1' }, 'مدة الانتظار'),
                                h('p', { className: 'text-lg font-bold text-red-600' }, formatTime(merchant.minutes_since))
                            )
                        )
                    ),
                    
                    // Quick Actions
                    h('div', { className: 'grid grid-cols-2 gap-4 mb-6' },
                        h('button', {
                            onClick: () => {
                                window.location.href = `tel:${merchant.phone}`;
                                setCallStarted(true);
                            },
                            className: 'bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:from-green-600 hover:to-green-700 transition-all flex items-center justify-center gap-2'
                        },
                            h(PhoneIcon),
                            'اتصال مباشر'
                        ),
                        h('button', {
                            onClick: openWhatsApp,
                            className: 'bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:from-blue-600 hover:to-blue-700 transition-all flex items-center justify-center gap-2'
                        },
                            h(MessageIcon),
                            'واتساب'
                        )
                    ),
                    
                    // Nawras Note (Mandatory)
                    h('div', { className: 'mb-6' },
                        h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' },
                            'ملاحظات النورس ',
                            h('span', { className: 'text-red-500' }, '*'),
                            h('span', { className: 'text-xs text-gray-500 font-normal' }, ' (10 أحرف على الأقل)')
                        ),
                        h('textarea', {
                            value: notes,
                            onChange: (e) => setNotes(e.target.value),
                            placeholder: 'اكتب نتيجة المكالمة، ملاحظات المتجر، توقعات الشحن، أو أي معلومات مهمة...',
                            rows: 6,
                            className: 'w-full px-4 py-3 border-2 rounded-xl focus:border-blue-500 outline-none resize-none'
                        }),
                        h('div', { className: 'flex items-center justify-between mt-2' },
                            h('p', { className: `text-xs ${notes.length >= 10 ? 'text-green-600' : 'text-red-500'} font-semibold` },
                                `${notes.length} حرف${notes.length < 10 ? ` (يتبقى ${10 - notes.length})` : ' ✓'}`
                            ),
                            notes.length >= 10 && h('span', { className: 'text-green-600 flex items-center gap-1' },
                                h(CheckIcon),
                                h('span', { className: 'text-xs font-bold' }, 'جاهز')
                            )
                        )
                    ),
                    
                    // Call Completed Button
                    h('button', {
                        onClick: () => onComplete(notes),
                        disabled: notes.length < 10,
                        className: `w-full ${
                            notes.length >= 10
                                ? 'bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 cursor-pointer'
                                : 'bg-gray-300 cursor-not-allowed'
                        } text-white py-5 rounded-xl font-bold text-xl shadow-lg transition-all flex items-center justify-center gap-2`
                    },
                        h(CheckIcon),
                        'تم إنهاء المكالمة'
                    )
                )
            );
        }

        // Mount App
        const root = createRoot(document.getElementById('app'));
        root.render(h(App));
    </script>
</body>
</html>
